<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        var params = new URLSearchParams(window.location.search);
        var p = params.get('p');
        if (p) {
          var base = '/DePedal-Campus-Bike-Sharing-App/';
          var q = params.get('q');
          history.replaceState(null, null,
            base + p + (q ? '?' + q : '') + window.location.hash
          );
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DePedal — Smart barcode-authenticated bicycle sharing system for De La Salle University – Dasmariñas. GPS-tracked, GCash-enabled, carbon-saving campus mobility." />
    <meta name="theme-color" content="#15803d" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>DePedal — Smart Bicycle Sharing | DLSU-D</title>
    <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
